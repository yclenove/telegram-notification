<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telegram 多机器人网关管理台</title>
  <style>
    body { margin: 0; font-family: "Segoe UI", "PingFang SC", sans-serif; background: #0f172a; color: #e2e8f0; }
    .layout { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }
    .side { background: #111827; padding: 20px; border-right: 1px solid #334155; }
    .side h2 { margin-top: 0; color: #93c5fd; }
    .side button { width: 100%; margin-bottom: 10px; padding: 10px; border: 1px solid #374151; background: #1f2937; color: #e5e7eb; border-radius: 8px; cursor: pointer; }
    .main { padding: 20px; }
    .card { background: #111827; border: 1px solid #334155; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    input, select, textarea { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #475569; background: #0b1220; color: #e2e8f0; margin-top: 8px; }
    label { display: block; margin-bottom: 12px; font-size: 14px; }
    button.primary { background: linear-gradient(135deg, #2563eb, #7c3aed); border: none; color: white; padding: 10px 14px; border-radius: 8px; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border-bottom: 1px solid #334155; padding: 8px; text-align: left; font-size: 13px; }
    .muted { color: #94a3b8; font-size: 12px; }
  </style>
</head>
<body>
<div class="layout">
  <aside class="side">
    <h2>管理台</h2>
    <button onclick="show('dashboard')">仪表盘</button>
    <button onclick="show('bots')">机器人管理</button>
    <button onclick="show('rules')">路由规则</button>
    <button onclick="show('events')">事件中心</button>
    <div class="muted">前后端分离版本的静态前端，默认请求同域 API。</div>
  </aside>
  <main class="main">
    <div class="card">
      <h3>登录</h3>
      <label>用户名<input id="username" value="admin"/></label>
      <label>密码<input id="password" type="password" placeholder="请输入管理员密码"/></label>
      <button class="primary" onclick="login()">登录并加载数据</button>
      <div id="loginStatus" class="muted"></div>
    </div>

    <section id="dashboard" class="card">
      <h3>仪表盘</h3>
      <div class="grid" id="stats"></div>
    </section>

    <section id="bots" class="card" style="display:none">
      <h3>新增机器人</h3>
      <label>名称<input id="botName" /></label>
      <label>Bot Token<input id="botToken" /></label>
      <label>备注<input id="botRemark" /></label>
      <label><input id="botDefault" type="checkbox" /> 设为默认机器人</label>
      <button class="primary" onclick="createBot()">创建机器人</button>
      <h4>机器人列表</h4>
      <table><thead><tr><th>ID</th><th>名称</th><th>默认</th><th>启用</th></tr></thead><tbody id="botRows"></tbody></table>
    </section>

    <section id="rules" class="card" style="display:none">
      <h3>新增规则</h3>
      <label>规则名<input id="ruleName" /></label>
      <label>优先级<input id="rulePriority" value="100" /></label>
      <label>匹配来源<input id="ruleSource" placeholder="如 baota，留空=全部"/></label>
      <label>匹配级别<input id="ruleLevel" placeholder="如 critical，留空=全部"/></label>
      <label>目标 Destination ID<input id="ruleDestinationID" /></label>
      <button class="primary" onclick="createRule()">创建规则</button>
      <h4>规则列表</h4>
      <table><thead><tr><th>ID</th><th>名称</th><th>优先级</th><th>来源</th><th>级别</th><th>目标</th></tr></thead><tbody id="ruleRows"></tbody></table>
    </section>

    <section id="events" class="card" style="display:none">
      <h3>事件中心</h3>
      <button class="primary" onclick="loadEvents()">刷新</button>
      <table><thead><tr><th>ID</th><th>EventID</th><th>来源</th><th>级别</th><th>状态</th><th>时间</th></tr></thead><tbody id="eventRows"></tbody></table>
    </section>
  </main>
</div>
<script>
  let token = "";
  const sections = ["dashboard","bots","rules","events"];
  function show(id){ sections.forEach(s=>document.getElementById(s).style.display = s===id ? "block":"none"); }
  async function api(path, options = {}) {
    const headers = options.headers || {};
    headers["Content-Type"] = "application/json";
    if (token) headers["Authorization"] = "Bearer " + token;
    const res = await fetch(path, { ...options, headers });
    if (!res.ok) throw new Error(await res.text());
    return await res.json();
  }
  async function login() {
    try {
      const data = await api("/api/v2/auth/login", { method:"POST", body: JSON.stringify({ username: username.value, password: password.value }) });
      token = data.access_token;
      loginStatus.textContent = "登录成功，权限：" + data.permissions.join(", ");
      await Promise.all([loadDashboard(), loadBots(), loadRules(), loadEvents()]);
    } catch (e) {
      loginStatus.textContent = "登录失败：" + e.message;
    }
  }
  async function loadDashboard() {
    const s = await api("/api/v2/dashboard");
    stats.innerHTML = Object.entries(s).map(([k,v])=>`<div class="card"><div>${k}</div><h2>${v}</h2></div>`).join("");
  }
  async function loadBots() {
    const list = await api("/api/v2/bots");
    botRows.innerHTML = list.map(b=>`<tr><td>${b.id}</td><td>${b.name}</td><td>${b.is_default}</td><td>${b.is_enabled}</td></tr>`).join("");
  }
  async function createBot() {
    await api("/api/v2/bots", { method:"POST", body: JSON.stringify({ name: botName.value, bot_token: botToken.value, remark: botRemark.value, is_default: botDefault.checked }) });
    await loadBots();
  }
  async function loadRules() {
    const list = await api("/api/v2/rules");
    ruleRows.innerHTML = list.map(r=>`<tr><td>${r.id}</td><td>${r.name}</td><td>${r.priority}</td><td>${r.match_source||"-"}</td><td>${r.match_level||"-"}</td><td>${r.destination_id}</td></tr>`).join("");
  }
  async function createRule() {
    await api("/api/v2/rules", { method:"POST", body: JSON.stringify({
      name: ruleName.value,
      priority: Number(rulePriority.value),
      match_source: ruleSource.value,
      match_level: ruleLevel.value,
      destination_id: Number(ruleDestinationID.value)
    })});
    await loadRules();
  }
  async function loadEvents() {
    const list = await api("/api/v2/events");
    eventRows.innerHTML = list.map(e=>`<tr><td>${e.id}</td><td>${e.event_id}</td><td>${e.source}</td><td>${e.level}</td><td>${e.status}</td><td>${e.created_at}</td></tr>`).join("");
  }
</script>
</body>
</html>
